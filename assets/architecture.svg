<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="azure" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0078d4"/>
      <stop offset="1" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="pbi" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f2c811"/>
      <stop offset="1" stop-color="#d4af0a"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3b9dff"/>
      <stop offset="1" stop-color="#1f78d1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <rect width="1000" height="460" fill="#fafbfc"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#222">Azure FinOps Cockpit — Data Flow</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#666">From scheduled Cost Management exports to live Power BI dashboards. No middleware.</text>

  <!-- Step 1: Cost Management -->
  <g>
    <rect x="50" y="120" width="220" height="220" rx="12" fill="url(#azure)" stroke="#003c75" stroke-width="1.5"/>
    <text x="160" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Azure Cost Management</text>
    <text x="160" y="170" text-anchor="middle" font-size="11" fill="#cce4f7">Scheduled Exports</text>
    <line x1="70" y1="185" x2="250" y2="185" stroke="#cce4f7" stroke-width="1" opacity="0.5"/>
    <text x="80" y="208" font-size="11" fill="#fff">• Daily MTD export</text>
    <text x="80" y="228" font-size="11" fill="#fff">• Classic MCA schema</text>
    <text x="80" y="248" font-size="11" fill="#fff">• FOCUS 1.0 schema</text>
    <text x="80" y="268" font-size="11" fill="#fff">• Actual + Amortized</text>
    <text x="80" y="298" font-size="10" fill="#a8d0f0" font-style="italic">Native, free, runs in</text>
    <text x="80" y="312" font-size="10" fill="#a8d0f0" font-style="italic">your subscription</text>
  </g>

  <!-- Arrow -->
  <line x1="280" y1="230" x2="370" y2="230" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="325" y="220" text-anchor="middle" font-size="10" fill="#666">writes</text>
  <text x="325" y="248" text-anchor="middle" font-size="10" fill="#666">.csv.gz daily</text>

  <!-- Step 2: Blob Storage -->
  <g>
    <rect x="390" y="120" width="220" height="220" rx="12" fill="url(#storage)" stroke="#1860a0" stroke-width="1.5"/>
    <text x="500" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Azure Blob Storage</text>
    <text x="500" y="170" text-anchor="middle" font-size="11" fill="#cce4f7">Container: cost-analysis</text>
    <line x1="410" y1="185" x2="590" y2="185" stroke="#cce4f7" stroke-width="1" opacity="0.5"/>
    <text x="420" y="208" font-size="11" fill="#fff" font-family="ui-monospace, Menlo, monospace">2026-01.csv.gz</text>
    <text x="420" y="228" font-size="11" fill="#fff" font-family="ui-monospace, Menlo, monospace">2026-02.csv.gz</text>
    <text x="420" y="248" font-size="11" fill="#fff" font-family="ui-monospace, Menlo, monospace">2026-03.csv.gz</text>
    <text x="420" y="268" font-size="11" fill="#fff" font-family="ui-monospace, Menlo, monospace">manifest.json</text>
    <text x="572" y="268" font-size="11" fill="#ff9999">←excluded</text>
    <text x="420" y="298" font-size="10" fill="#a8d0f0" font-style="italic">Standard LRS · ~$1/mo</text>
    <text x="420" y="312" font-size="10" fill="#a8d0f0" font-style="italic">for typical tenant</text>
  </g>

  <!-- Arrow -->
  <line x1="620" y1="230" x2="710" y2="230" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="665" y="220" text-anchor="middle" font-size="10" fill="#666">reads via</text>
  <text x="665" y="248" text-anchor="middle" font-size="10" fill="#666">Blob Data Reader</text>

  <!-- Step 3: Power BI -->
  <g>
    <rect x="730" y="120" width="220" height="220" rx="12" fill="url(#pbi)" stroke="#a8870a" stroke-width="1.5"/>
    <text x="840" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#222">Power BI</text>
    <text x="840" y="170" text-anchor="middle" font-size="11" fill="#5b4400">Desktop + Service</text>
    <line x1="750" y1="185" x2="930" y2="185" stroke="#5b4400" stroke-width="1" opacity="0.4"/>
    <text x="760" y="208" font-size="11" fill="#222">• 3 dashboard pages</text>
    <text x="760" y="228" font-size="11" fill="#222">• 68 DAX measures</text>
    <text x="760" y="248" font-size="11" fill="#222">• Dynamic tag expansion</text>
    <text x="760" y="268" font-size="11" fill="#222">• Daily refresh</text>
    <text x="760" y="298" font-size="10" fill="#5b4400" font-style="italic">Pro for share, Free</text>
    <text x="760" y="312" font-size="10" fill="#5b4400" font-style="italic">to author/inspect</text>
  </g>

  <!-- Footer / pages strip -->
  <g>
    <rect x="50" y="370" width="900" height="60" rx="8" fill="#fff" stroke="#e1e4e8"/>
    <rect x="60" y="380" width="290" height="40" rx="6" fill="#f1f8ff" stroke="#c8e1ff"/>
    <text x="205" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#0366d6">🏛️ Executive Summary</text>
    <text x="205" y="413" text-anchor="middle" font-size="10" fill="#586069">CFO · Where did we spend?</text>
    <rect x="360" y="380" width="280" height="40" rx="6" fill="#fff8e1" stroke="#ffd76b"/>
    <text x="500" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#735c00">🏷️ Tags &amp; Governance</text>
    <text x="500" y="413" text-anchor="middle" font-size="10" fill="#735c00">Platform · Are we leaking?</text>
    <rect x="650" y="380" width="290" height="40" rx="6" fill="#e6f4ea" stroke="#9bd1a8"/>
    <text x="795" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#0a5a1f">💡 FinOps Optimization</text>
    <text x="795" y="413" text-anchor="middle" font-size="10" fill="#0a5a1f">FinOps · Are we paying retail?</text>
  </g>
</svg>
